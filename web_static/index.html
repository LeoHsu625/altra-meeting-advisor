<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI 即時會議顧問</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f1117;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    background: #1a1d27;
    border-bottom: 1px solid #2a2d3a;
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo { font-size: 15px; font-weight: 700; color: #e8eaf6; letter-spacing: .3px; }
  .logo span { color: #7c83ff; }

  .conn-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #555; flex-shrink: 0;
  }
  .conn-dot.connected { background: #4caf50; box-shadow: 0 0 6px #4caf50; }
  .conn-dot.paused { background: #ff9800; box-shadow: 0 0 6px #ff9800; }
  .conn-dot.error { background: #f44336; box-shadow: 0 0 6px #f44336; }

  .conn-label { font-size: 13px; color: #666; }
  .conn-label.connected { color: #888; }

  .header-right { display: flex; gap: 10px; align-items: center; }
  .history-badge {
    font-size: 11px; color: #7c83ff; background: rgba(124,131,255,.12);
    border: 1px solid rgba(124,131,255,.25);
    padding: 3px 10px; border-radius: 20px; display: none;
  }

  /* ── Buttons ── */
  .btn { padding: 8px 18px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity .15s, transform .1s; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn:not(:disabled):active { transform: scale(.97); }
  .btn-cue  { background: #3d5afe; color: #fff; }
  .btn-cue:not(:disabled):hover  { background: #304ffe; }
  .btn-pause { background: #37474f; color: #fff; }
  .btn-pause:not(:disabled):hover { background: #263238; }
  .btn-pause.resuming { background: #1b5e20; }
  .btn-pause.resuming:not(:disabled):hover { background: #2e7d32; }
  .btn-stop  { background: #c62828; color: #fff; }
  .btn-stop:not(:disabled):hover  { background: #b71c1c; }
  .btn-voice { background: #1e2130; color: #666; border: 1px solid #2a2d3a; }
  .btn-voice.on  { background: rgba(124,131,255,.15); color: #7c83ff; border-color: rgba(124,131,255,.3); }
  .btn-voice:not(:disabled):hover { opacity: .8; }

  /* ── Main layout ── */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: #2a2d3a;
    overflow: hidden;
  }

  .col {
    background: #0f1117;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .col-header {
    padding: 14px 20px 10px;
    border-bottom: 1px solid #1e2130;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .col-title { font-size: 12px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: .8px; }
  .seg-count-badge {
    font-size: 11px; font-weight: 700;
    background: rgba(124,131,255,.15); color: #7c83ff;
    padding: 2px 8px; border-radius: 10px;
  }

  .col-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px 20px;
    scrollbar-width: thin;
    scrollbar-color: #2a2d3a transparent;
  }
  .col-body::-webkit-scrollbar { width: 4px; }
  .col-body::-webkit-scrollbar-thumb { background: #2a2d3a; border-radius: 2px; }

  /* ── Segment rows ── */
  .seg {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid #141720;
    min-height: 36px;
  }
  .seg:last-child { border-bottom: none; }

  .seg-time {
    font-size: 12px; color: #444; white-space: nowrap;
    padding-top: 2px; flex-shrink: 0; font-variant-numeric: tabular-nums;
  }

  .seg-body { flex: 1; }

  .seg-text {
    font-size: 14px; line-height: 1.75; color: #ccc;
  }

  /* status badges shown when no text yet */
  .seg-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; font-weight: 500; padding: 3px 10px;
    border-radius: 12px;
  }
  .seg-badge.recording {
    background: rgba(244,67,54,.1); color: #ef9a9a;
    border: 1px solid rgba(244,67,54,.2);
  }
  .seg-badge.transcribing {
    background: rgba(255,193,7,.08); color: #ffe082;
    border: 1px solid rgba(255,193,7,.15);
  }
  .seg-badge.silent {
    background: rgba(255,255,255,.04); color: #444;
    border: 1px solid rgba(255,255,255,.06);
  }
  .seg-badge.done {
    background: rgba(76,175,80,.08); color: #81c784;
    border: 1px solid rgba(76,175,80,.12);
    font-size: 11px;
  }

  /* placeholder when nothing yet */
  .placeholder { color: #333; font-size: 13px; padding: 8px 0; font-style: italic; }

  /* ── Right col: AI panel ── */
  .advice-empty {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%; gap: 10px;
  }
  .advice-empty .hint { font-size: 13px; color: #444; text-align: center; line-height: 1.6; }

  #advice-content { display: none; }
  #advice { font-size: 14px; line-height: 1.85; color: #c5cae9; white-space: pre-wrap; }

  .divider { border: none; border-top: 1px solid #1e2130; margin: 20px 0; }

  #summary-section { display: none; }
  .summary-label { font-size: 11px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 10px; }
  #summary { font-size: 13px; line-height: 1.85; color: #aaa; white-space: pre-wrap; }

  /* ── History modal ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.65); z-index: 100;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #1a1d27; border: 1px solid #2a2d3a;
    border-radius: 12px; width: 560px; max-width: 95vw;
    max-height: 80vh; display: flex; flex-direction: column;
    overflow: hidden;
  }
  .modal-header {
    padding: 16px 20px; border-bottom: 1px solid #2a2d3a;
    display: flex; justify-content: space-between; align-items: center;
  }
  .modal-title { font-size: 14px; font-weight: 600; color: #e8eaf6; }
  .modal-close {
    background: none; border: none; color: #666; font-size: 18px;
    cursor: pointer; line-height: 1; padding: 2px 6px; border-radius: 4px;
  }
  .modal-close:hover { color: #aaa; background: rgba(255,255,255,.06); }
  .modal-body { overflow-y: auto; padding: 12px 20px 20px; }
  .hist-item {
    padding: 12px 0; border-bottom: 1px solid #1e2130;
  }
  .hist-item:last-child { border-bottom: none; }
  .hist-date { font-size: 12px; color: #7c83ff; font-weight: 600; margin-bottom: 4px; }
  .hist-preview { font-size: 13px; color: #777; line-height: 1.6; }
  .hist-empty { font-size: 13px; color: #444; font-style: italic; padding: 12px 0; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="conn-dot" id="conn-dot"></div>
    <div class="logo">AI <span>即時會議顧問</span></div>
    <div class="conn-label" id="conn-label">連線中...</div>
  </div>
  <div class="header-right">
    <div class="history-badge" id="history-badge" onclick="openHistory()" style="cursor:pointer" title="點擊查看過去會議">已載入過去會議記憶 ›</div>
    <button class="btn btn-voice" id="btn-voice" onclick="toggleVoice()">🔇 語音關閉</button>
    <button class="btn btn-cue"   id="btn-cue"   onclick="cueAI()"       disabled>呼叫 AI 建議（F9）</button>
    <button class="btn btn-pause" id="btn-pause" onclick="togglePause()" disabled>暫停錄音</button>
    <button class="btn btn-stop"  id="btn-stop"  onclick="stopMeeting()" disabled>結束會議（F10）</button>
  </div>
</header>

<main>
  <!-- Left: per-segment transcript -->
  <div class="col">
    <div class="col-header">
      <span class="col-title">即時逐字稿</span>
      <span class="seg-count-badge" id="seg-count-badge">0 段</span>
    </div>
    <div class="col-body" id="seg-list">
      <div class="placeholder" id="placeholder">等待語音輸入...</div>
    </div>
  </div>

  <!-- Right: AI advice + summary -->
  <div class="col">
    <div class="col-header">
      <span class="col-title">AI 幕僚長建議</span>
    </div>
    <div class="col-body" id="right-body">
      <div class="advice-empty" id="advice-empty">
        <div class="hint">按下「呼叫 AI 建議」或 F9<br>AI 將根據當前逐字稿給出策略建議</div>
      </div>
      <div id="advice-content">
        <div id="advice"></div>
        <hr class="divider" id="summary-divider" style="display:none">
        <div id="summary-section">
          <div class="summary-label">會議摘要</div>
          <div id="summary"></div>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- History modal -->
<div class="modal-overlay" id="hist-overlay" onclick="closeHistory(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">過去會議記憶（最近 5 次）</span>
      <button class="modal-close" onclick="closeHistory()">✕</button>
    </div>
    <div class="modal-body" id="hist-body">
      <div class="hist-empty">載入中...</div>
    </div>
  </div>
</div>

<script>
  const connDot   = document.getElementById('conn-dot');
  const connLabel = document.getElementById('conn-label');
  const segList   = document.getElementById('seg-list');
  const adviceEl  = document.getElementById('advice');
  const summaryEl = document.getElementById('summary');
  const btnCue    = document.getElementById('btn-cue');
  const btnPause  = document.getElementById('btn-pause');
  const btnStop   = document.getElementById('btn-stop');
  const btnVoice  = document.getElementById('btn-voice');

  function updateVoiceBtn(enabled) {
    btnVoice.textContent = enabled ? '🔊 語音開啟' : '🔇 語音關閉';
    btnVoice.classList.toggle('on', enabled);
  }

  // ── Segment state store ──
  const segs = {};       // seq -> {seq, time, state, text, el}
  let doneCount = 0;
  let _isPaused = false;

  // Per-recording-segment countdown
  let _recSec = 0, _recTimer = null, _activeRecSeq = null;
  const CHUNK_SECS = 30;

  function startRecCountdown(seq) {
    _activeRecSeq = seq;
    _recSec = 0;
    if (_recTimer) clearInterval(_recTimer);
    _recTimer = setInterval(() => {
      _recSec++;
      const s = _activeRecSeq;
      if (segs[s] && segs[s].state === 'recording') {
        const badge = segs[s].el.querySelector('.seg-badge');
        if (badge) badge.textContent = `🔴 錄音中（${_recSec} / ${CHUNK_SECS} 秒）`;
      }
    }, 1000);
  }

  function stopRecCountdown() {
    if (_recTimer) { clearInterval(_recTimer); _recTimer = null; }
    _activeRecSeq = null;
  }

  // ── Render helpers ──
  function getOrCreateSegEl(seq) {
    if (segs[seq]) return segs[seq].el;
    const div = document.createElement('div');
    div.className = 'seg';
    div.dataset.seq = seq;
    segList.appendChild(div);
    return div;
  }

  function renderSeg(seq) {
    const s = segs[seq];
    if (!s) return;
    const el = s.el;
    if (s.state === 'done') {
      el.innerHTML = `
        <span class="seg-time">[${s.time}]</span>
        <div class="seg-body">
          <div class="seg-text">${s.text}</div>
        </div>
        <span class="seg-badge done">✅ 完成</span>`;
    } else if (s.state === 'transcribing') {
      el.innerHTML = `
        <span class="seg-time">[${s.time}]</span>
        <div class="seg-body">
          <span class="seg-badge transcribing">⏳ 轉錄中...</span>
        </div>`;
    } else if (s.state === 'recording') {
      el.innerHTML = `
        <span class="seg-time">[${s.time}]</span>
        <div class="seg-body">
          <span class="seg-badge recording">🔴 錄音中（0 / ${CHUNK_SECS} 秒）</span>
        </div>`;
    } else if (s.state === 'silent') {
      el.innerHTML = `
        <span class="seg-time">[${s.time}]</span>
        <div class="seg-body">
          <span class="seg-badge silent">（靜音，略過）</span>
        </div>`;
    }
  }

  function setConn(label, type) {
    connLabel.textContent = label;
    connDot.className = 'conn-dot' + (type ? ' ' + type : '');
  }

  // ── WebSocket ──
  const ws = new WebSocket(`ws://${location.host}/ws`);

  ws.onopen = () => setConn('連線中...', '');

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'ping') return;

    if (msg.type === 'init') {
      if (msg.history_loaded) document.getElementById('history-badge').style.display = 'block';
      updateVoiceBtn(msg.voice_enabled || false);
      btnCue.disabled = false;
      btnPause.disabled = false;
      btnStop.disabled = false;
      setConn('已連線，系統錄音中...', 'connected');
      // If reconnecting mid-meeting, restore existing transcript as a single segment
      if (msg.transcript) {
        document.getElementById('placeholder').style.display = 'none';
        const seq = 0;
        segs[seq] = { seq, time: '--:--:--', state: 'done', text: msg.transcript,
                      el: getOrCreateSegEl(seq) };
        renderSeg(seq);
      }
    }

    if (msg.type === 'recording_start') {
      document.getElementById('placeholder').style.display = 'none';
      const { seq, time } = msg;
      segs[seq] = { seq, time, state: 'recording', text: null, el: getOrCreateSegEl(seq) };
      renderSeg(seq);
      startRecCountdown(seq);
      segList.scrollTop = segList.scrollHeight;
      setConn('已連線，系統錄音中...', 'connected');
    }

    if (msg.type === 'transcribing') {
      const { seq } = msg;
      if (segs[seq]) {
        segs[seq].state = 'transcribing';
        stopRecCountdown();
        renderSeg(seq);
      }
    }

    if (msg.type === 'transcript') {
      const { seq, text, count } = msg;
      if (segs[seq]) {
        segs[seq].state = 'done';
        segs[seq].text = text;
        renderSeg(seq);
      }
      doneCount = count;
      document.getElementById('seg-count-badge').textContent = `${count} 段`;
    }

    if (msg.type === 'silent') {
      const { seq } = msg;
      if (segs[seq]) {
        segs[seq].state = 'silent';
        renderSeg(seq);
      }
    }

    if (msg.type === 'paused') {
      _isPaused = true;
      stopRecCountdown();
      setConn('已暫停錄音', 'paused');
      btnPause.textContent = '繼續錄音';
      btnPause.classList.add('resuming');
    }

    if (msg.type === 'resumed') {
      _isPaused = false;
      setConn('已連線，系統錄音中...', 'connected');
      btnPause.textContent = '暫停錄音';
      btnPause.classList.remove('resuming');
    }

    if (msg.type === 'voice_changed') {
      updateVoiceBtn(msg.enabled);
    }

    if (msg.type === 'advice') {
      document.getElementById('advice-empty').style.display = 'none';
      document.getElementById('advice-content').style.display = 'block';
      adviceEl.textContent = msg.text;
      document.getElementById('right-body').scrollTop = 0;
      btnCue.disabled = false;
      setConn('AI 建議已產出', 'connected');
    }

    if (msg.type === 'summary') {
      summaryEl.textContent = msg.text;
      document.getElementById('summary-divider').style.display = 'block';
      document.getElementById('summary-section').style.display = 'block';
      document.getElementById('advice-empty').style.display = 'none';
      document.getElementById('advice-content').style.display = 'block';
      setConn('摘要已儲存', 'connected');
      btnStop.disabled = true;
    }
  };

  ws.onclose = () => {
    setConn('連線中斷，請重新整理頁面', 'error');
    stopRecCountdown();
    btnCue.disabled = true;
    btnPause.disabled = true;
    btnStop.disabled = true;
  };

  // ── History modal ──
  async function openHistory() {
    document.getElementById('hist-overlay').classList.add('open');
    const body = document.getElementById('hist-body');
    body.innerHTML = '<div class="hist-empty">載入中...</div>';
    try {
      const res = await fetch('/history');
      const data = await res.json();
      if (!data.length) {
        body.innerHTML = '<div class="hist-empty">尚無歷史會議記錄。</div>';
        return;
      }
      body.innerHTML = data.map(m => `
        <div class="hist-item">
          <div class="hist-date">${m.date}</div>
          <div class="hist-preview">${m.summary_preview}${m.summary_preview.length >= 100 ? '...' : ''}</div>
        </div>`).join('');
    } catch {
      body.innerHTML = '<div class="hist-empty">載入失敗，請稍後再試。</div>';
    }
  }

  function closeHistory(e) {
    if (e && e.target !== document.getElementById('hist-overlay')) return;
    document.getElementById('hist-overlay').classList.remove('open');
  }

  // ── Actions ──
  async function toggleVoice() {
    try {
      const res = await fetch('/voice/toggle', { method: 'POST' });
      const data = await res.json();
      updateVoiceBtn(data.voice_enabled);
    } catch {
      setConn('語音切換失敗', 'error');
    }
  }

  async function togglePause() {
    const endpoint = _isPaused ? '/resume' : '/pause';
    try {
      const res = await fetch(endpoint, { method: 'POST' });
      if (!res.ok) throw new Error();
    } catch {
      setConn('操作失敗，請重試', 'error');
    }
  }

  async function cueAI() {
    btnCue.disabled = true;
    setConn('AI 生成建議中（約 10 秒）...', 'connected');
    try {
      const res = await fetch('/cue', { method: 'POST' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (data.status === 'busy') {
        setConn('AI 正在處理上一個請求，請稍候...', 'connected');
        btnCue.disabled = false;
      }
    } catch {
      setConn('AI 請求失敗，請稍候重試', 'error');
      btnCue.disabled = false;
    }
  }

  async function stopMeeting() {
    if (!confirm('確定結束會議並產出摘要？')) return;
    btnStop.disabled = true;
    btnCue.disabled = true;
    btnPause.disabled = true;
    setConn('產出摘要中...', 'connected');
    try {
      const res = await fetch('/stop', { method: 'POST' });
      if (!res.ok) throw new Error();
    } catch {
      setConn('結束請求失敗，請重試', 'error');
      btnStop.disabled = false;
      btnCue.disabled = false;
      btnPause.disabled = false;
    }
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'F9'  && !btnCue.disabled)  { e.preventDefault(); cueAI(); }
    if (e.key === 'F10' && !btnStop.disabled) { e.preventDefault(); stopMeeting(); }
    if (e.key === 'Escape') closeHistory();
  });
</script>
</body>
</html>
